<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Exemplo básico de página HTML5">
    <meta name="author" content="Seu Nome">
    <title>Página HTML5 Exemplo</title>
    <style>
        /* Estilos básicos para exemplo */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header, nav, main, footer {
            padding: 1rem;
            margin: 0 auto;
            max-width: 900px;
        }
        header {
            background-color: #333;
            color: white;
        }
        nav a {
            margin-right: 15px;
            color: white;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            background-color: white;
            padding: 1rem;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body> 
    <p> Olá Mundo!</p>

    <header>
        <h1>Bem-vindo ao HTML5</h1>
        <nav>
            <a href="#inicio">Início</a>
            <a href="#sobre">Sobre</a>
            <a href="#contato">Contato</a>
        </nav>
    </header>

    <main>
        <section id="inicio">
            <h2>Início</h2>
            <p>Este é um exemplo de página HTML5 com estrutura básica.</p>
        </section>

        <section id="sobre">
            <h2>Sobre</h2>
            <p>HTML5 é a versão mais recente da linguagem de marcação HTML, usada para estruturar conteúdo na web.</p>
        </section>

        <section id="contato">
            <h2>Contato</h2>
            <form action="#" method="post">
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea><br><br>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Seu Nome. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
